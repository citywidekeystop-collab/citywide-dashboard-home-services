<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citywide Admin Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#eef3fb;color:#07142f}
.wrap{max-width:1200px;margin:auto;padding:18px}
.top{background:#061331;color:white;border-radius:24px;padding:22px;margin-bottom:16px}
.top h1{margin:0;font-size:30px}
.card{background:white;border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat b{font-size:34px;color:#005eff}
.stat span{display:block;font-weight:900}
.job{border-left:6px solid #005eff}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #e5e7eb;padding:10px 0;font-weight:800}
.row span{color:#667085}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
button{border:0;border-radius:14px;padding:12px;font-weight:1000;color:white}
.assign{background:#005eff}
.progress{background:#f59e0b}
.complete{background:#00a651}
.delete{background:#ef4444}
.empty{color:#667085;font-weight:800}
@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}.actions{grid-template-columns:1fr 1fr}}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<h1>Citywide Admin Dashboard</h1>
<p>Live booking + dispatch board</p>
</div>

<div class="grid">
<div class="card stat"><b id="newCount">0</b><span>New Jobs</span></div>
<div class="card stat"><b id="totalCount">0</b><span>Total Jobs</span></div>
<div class="card stat"><b id="completedCount">0</b><span>Completed</span></div>
<div class="card stat"><b id="revenue">$0</b><span>Revenue</span></div>
</div>

<div class="card">
<h2>Incoming Jobs</h2>
<div id="jobsList" class="empty">No jobs yet.</div>
</div>

</div>

<script src="/app.js"></script>

<script>
function renderAdminJobs(){
const jobs = getJobs();
const list = document.getElementById("jobsList");

document.getElementById("totalCount").textContent = jobs.length;
document.getElementById("newCount").textContent = jobs.filter(j => j.status === "New").length;
document.getElementById("completedCount").textContent = jobs.filter(j => j.status === "Completed").length;
document.getElementById("revenue").textContent = "$" + (jobs.filter(j => j.status === "Completed").length * 240);

if(jobs.length === 0){
list.innerHTML = "No jobs yet.";
return;
}

list.innerHTML = jobs.map(job => `
<div class="card job">
<h2>${job.product || "Service Request"}</h2>
<div class="row"><span>Customer</span>${job.name || ""}</div>
<div class="row"><span>Phone</span>${job.phone || ""}</div>
<div class="row"><span>Address</span>${job.address || ""}</div>
<div class="row"><span>Style</span>${job.style || ""}</div>
<div class="row"><span>Date/Time</span>${job.date || ""} ${job.time || ""}</div>
<div class="row"><span>Payment</span>${job.payment || ""}</div>
<div class="row"><span>Status</span>${job.status || "New"}</div>
<div class="row"><span>Assigned To</span>${job.assignedTo || "Unassigned"}</div>
<div class="row"><span>Details</span>${job.details || ""}</div>

<div class="actions">
<button class="assign" onclick="assignJob(${job.id}, 'Max')">Assign Max</button>
<button class="progress" onclick="updateJobStatus(${job.id}, 'In Progress')">In Progress</button>
<button class="complete" onclick="updateJobStatus(${job.id}, 'Completed')">Complete</button>
<button class="delete" onclick="deleteJob(${job.id})">Delete</button>
</div>
</div>
`).join("");
}

function assignJob(id, tech){
const jobs = getJobs();
const job = jobs.find(j => j.id === id);
if(job){
job.assignedTo = tech;
job.status = "Assigned";
saveJobs(jobs);
renderAdminJobs();
}
}

function updateJobStatus(id, status){
const jobs = getJobs();
const job = jobs.find(j => j.id === id);
if(job){
job.status = status;
saveJobs(jobs);
renderAdminJobs();
}
}

function deleteJob(id){
const jobs = getJobs().filter(j => j.id !== id);
saveJobs(jobs);
renderAdminJobs();
}

renderAdminJobs();
</script>

</body>
</html>
